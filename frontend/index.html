    <script>
      // Resolve theme before paint so dark-mode users never see a light flash.
      // Reads the same key App.jsx writes; App.jsx then reads back the attribute.
      (function () {
        var saved = localStorage.getItem("theme");
        var prefersDark =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = saved === "light" || saved === "dark"
          ? saved
          : prefersDark ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
